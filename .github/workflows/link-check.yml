name: Link Check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  link-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run pages

      - name: Run Linkinator
        id: linkinator
        uses: JustinBeckwith/linkinator-action@v2
        continue-on-error: true
        with:
          paths: "_site"
          recurse: true
          cleanUrls: true
          timeout: 10000
          retryErrors: true
          retryErrorsCount: 2
          verbosity: ERROR
          statusCodes: '{"4xx":"warn","5xx":"warn"}'
          redirects: allow
          linksToSkip: "search.usa.gov/javascripts/remote.loader.js"
          urlRewriteSearch: "^/~assets/"
          urlRewriteReplace: "https://www.restorethegulf.gov/~assets/"

      - name: Format Link Check Summary
        env:
          LINKINATOR_RESULTS: ${{ steps.linkinator.outputs.results }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: node scripts/format-linkinator-results.mjs
